<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="201" height="37">
   <defs>
      <style type="text/css">
    @namespace "http://www.w3.org/2000/svg";
    .line                 {fill: none; stroke: #211E1E; stroke-width: 1;}
    .bold-line            {stroke: #0B0A0A; shape-rendering: crispEdges; stroke-width: 2;}
    .thin-line            {stroke: #100F0F; shape-rendering: crispEdges}
