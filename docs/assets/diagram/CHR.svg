    rect.nonterminal      {fill: #E6E4E3; stroke: #211E1E; stroke-width: 1;}
    rect.text             {fill: none; stroke: none;}
    polygon.regexp        {fill: #F1EFEF; stroke: #211E1E; stroke-width: 1;}
  </style>
