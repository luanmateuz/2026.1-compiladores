site_name: 2026-1.compiladores
site_description: Docs for 2026-1.compiladores
site_url: http://github.com/luanmateuz/2026.1-compiladores
repo_name: 2026.1-compiladores
repo_url: http://github.com/luanmateuz/2026.1-compiladores
docs_dir: docs

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  font: false
  language: pt-BR
  palette:
    - scheme: default
      primary: grey
      accent : grey
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - toc.integrate
nav:
  - grammar.md
  - syntax.md
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
plugins:
  - search
  - i18n:
        default_language: pt-BR
        docs_structure: suffix
        languages:
          - locale: pt-BR
            name: Português
            build: true
            default: true

          - locale: en
            name: English
            build: true

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: Português
      link: /
      lang: pt-BR
